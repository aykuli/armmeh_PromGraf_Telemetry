name: CI/CD Production Pipeline

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  # === ЭТАП 1: ПАРАЛЛЕЛЬНАЯ СБОРКА ОБРАЗОВ ===
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app_name: backend
            context_dir: ./go-projects-group
            docker_file: Dockerfile.backend
          - app_name: bot
            context_dir: ./go-projects-group
            docker_file: Dockerfile.bot
          - app_name: simulator
            context_dir: ./go-projects-group
            docker_file: Dockerfile.simulator
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ${{ matrix.app_name }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context_dir }}
        file: ${{ matrix.context_dir }}/${{ matrix.docker_file }}
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/${{ matrix.app_name }}:latest
          ghcr.io/${{ github.repository }}/${{ matrix.app_name }}:${{ github.sha }}
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    steps:
        # 1. Скачиваем файлы репозитория на раннер GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. НОВЫЙ ШАГ: Безопасно копируем только compose.yml и папки с конфигами на сервер
    - name: Copy Config Files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.MY_SERVER_NAME }}
        username: ${{ github.actor }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        # Указываем, какие файлы и папки нужно перенести (через запятую)
        source: "compose.yml,nginx/,prometheus/,mosquitto/" 
        target: "/opt/app"
        # Флаг clean: false предотвращает удаление папок certbot и данных, которые уже есть на сервере
        clean: false 

    - name: Compose reload
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.MY_SERVER_NAME}}
        username: ${{ github.actor}}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "---------- START DEPLOY ----------"
          cd /opt/app
          
          # Авторизуем docker на сервере в GHCR, чтобы он мог стянуть новые образы
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          
          # Скачиваю новые версии собранных образов из реестра пакетов GitHub
          sudo docker compose pull
          
          # Перезапускаю измененные контейнеры без остановки всей системы
          sudo docker compose up -d --remove-orphans
          
          echo "---------- SUCCESSFUL DEPLOY ----------"