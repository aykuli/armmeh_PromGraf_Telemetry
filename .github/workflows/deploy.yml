name: CI/CD Production Pipeline

# on:
#   push:
#     branches: [ "master" ]
#TODO run after terraform apply
on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  # === ЭТАП 1: ПАРАЛЛЕЛЬНАЯ СБОРКА ОБРАЗОВ ===
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app_name: backend
            context_dir: ./go-projects-group
            docker_file: Dockerfile.backend
          - app_name: bot
            context_dir: ./go-projects-group
            docker_file: Dockerfile.bot
          - app_name: simulator
            context_dir: ./go-projects-group
            docker_file: Dockerfile.simulator
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push ${{ matrix.app_name }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context_dir }}
        file: ${{ matrix.context_dir }}/${{ matrix.docker_file }}
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/${{ matrix.app_name }}:latest
          ghcr.io/${{ github.repository }}/${{ matrix.app_name }}:${{ github.sha }}

  # === ЭТАП 2: ПЕРЕСОБРАНИЕ ОБРАЗОВ НА СЕРВЕРЕ ===
  terraform-deploy:
    needs: build-images
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terra
    env:
      # Ключи доступа для бакета с tfstate
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps: