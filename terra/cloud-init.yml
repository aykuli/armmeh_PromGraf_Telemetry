#cloud-config
users:
  - name: ${github_user}
    groups: sudo
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    ssh_authorized_keys:
      - ${ssh_public_key}
package_update: true
package_upgrade: false
packages:
  - nano
  - bastet
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
write_files:
  - path: /opt/tmp/.env
    permissions: '0600'
    content: |
      MQTT_BROKER_URL=${mqtt_broker_url}
      MQTT_USER=${mqtt_user}
      MQTT_PASS=${mqtt_pass}

      FLEET_BACKEND_URL=${fleet_backend_url}

      BOT_TOKEN=${tg_bot_token}
      TELEGRAM_CHAT_ID=${tg_chat_id}

      GRAFANA_ADMIN_PASSWORD=${grafana_admin_pass}
      GRAFANA_ADMIN_NAME=${grafana_admin_name}
      GRAFANA_ADMIN_EMAIL=${grafana_admin_email}

      POSTGRES_URI=${postgres_uri}
      POSTGRES_DB=${postgres_db}
      POSTGRES_USER=${postgres_user}
      POSTGRES_PASSWORD=${postgres_pass}
  - path: /opt/tmp/nginx/.htpasswd
    permissions: '0600'
    owner: root:root
    content: |
      ${htpasswd_content}
  - path: /opt/tmp/mosquitto/password.txt
    permissions: '0600'
    owner: root:root
    content: |
      ${mqqt_broker_passwd_content}

runcmd:
  # Ждем, пока apt освободится (важно для облаков)
  - while fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1; do sleep 1; done

  - echo '----------START ----------------'
  # 2. Создаем структуру и клонируем проект тоже в /opt/app/
  - mkdir -p /opt/app
  - git clone https://github.com/${github_user}/${github_repo}.git /opt/app
  - mv /opt/tmp/.env /opt/app
  - mv /opt/tmp/nginx/.htpasswd /opt/app/nginx
  - mv /opt/tmp/mosquitto/password.txt /opt/app/mosquitto/config

  # Prep Mosquitto directories with proper write clearances
  - mkdir -p /opt/app/mosquitto/config /opt/app/mosquitto/log
  - chmod -R 777 /opt/app/mosquitto/log
  
  # 3. Генерируем временные заглушки SSL в новой директории
  - mkdir -p /opt/app/certbot/conf/live/mymeddata.ru
  - openssl req -x509 -nodes -newkey rsa:2048 -days 1 -keyout /opt/app/certbot/conf/live/mymeddata.ru/privkey.pem -out /opt/app/certbot/conf/live/mymeddata.ru/fullchain.pem -subj '/CN=localhost'
  
  # 4. Переходим в /opt/app/ и запускаем инфраструктуру под root-правами cloud-init
  - cd /opt/app && docker compose up -d nginx
  
  # 5. Запрашиваем сертификат Let's Encrypt через Certbot
  - >
    docker run -it --rm --name certbot 
    -v "./certbot/conf:/etc/letsencrypt" 
    -v "/var/lib/letsencrypt:/var/lib/letsencrypt" 
    -p 80:80 
    certbot/certbot certonly --standalone 
    -d mymeddata.ru 
    --email aykuli@.ya.ru
    --agree-tos
    --no-eff-email
    --non-interactive
  # 6. Финальный запуск и поднятие всего стека
  - docker compose up -d
  - echo '---------- END INITIALIZATION ----------'

